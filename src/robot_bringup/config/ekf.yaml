ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: false
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame:     odom

    odom0: /odom
    # Order: x  y  z  roll  pitch  yaw  vx  vy  vz  vroll  vpitch  vyaw  ax  ay  az
    odom0_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, true,
                   false, false, false]

    # Trust level for odometry
    odom0_queue_size: 10

    odom0_differential: false

    odom0_nodelay: false


    imu0: /robot/imu/data_raw

    # Order: x  y  z  roll  pitch  yaw  vx  vy  vz  vroll  vpitch  vyaw  ax  ay  az
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

    imu0_queue_size: 10

    # The BNO085 provides absolute orientation so we do NOT differentiate it
    imu0_differential: false

    # Remove gravity from acceleration (not needed since we ignore acceleration)
    imu0_remove_gravitational_acceleration: true

    imu0_relative: false 

    imu0_nodelay: false
    
    # Print debug info
    print_diagnostics: true